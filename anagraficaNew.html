        .box-input { margin-bottom: 12px; }
        .errore { color: red; font-size: 13px; font-weight: bold; display: block; margin-top: 2px; }
        fieldset { border: 2px solid #34495e; background-color: white; padding: 20px; border-radius: 8px; }
        legend { font-weight: bold; color: #34495e; }

        </div>
    </fieldset>

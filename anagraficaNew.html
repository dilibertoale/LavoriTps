<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagrafica 6</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
        }

        .dati {
            background: white;
            padding: 20px;
            width: 300px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #1d2630;
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            box-sizing: border-box;
        }

        .errore-testo {
            color: red;
            margin: 0;
            font-size: 14px;
            min-height: 20px;
        }

        input[type="button"] {
            background-color: #34495e;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="button"]:hover {
            background-color: #2c3e50;
        }
    </style>
</head>
<body>

    <div class="dati">
        <label for="nome">Inserisci Nome</label>
        <input type="text" id="nome" >
        <p id="errore_nome" class="errore-testo"></p>
        <label for="cognome">Inserisci Cognome</label>
        <input type="text" id="cognome">
        <p id="errore_cognome" class="errore-testo"></p>
        <label for="cap">Inserisci Cap</label>
        <input type="text" id="cap">
        <p id="errore_cap" class="errore-testo"></p>
        <label for="email">Inserisci Email</label>
        <input type="email" id="email">
        <p id="errore_email" class="errore-testo"></p>
        <label for="codice_fiscale">Inserisci Codice Fiscale</label>
        <input type="text" id="codice_fiscale">
        <p id="errore_fiscale" class="errore-testo"></p>

        <br>
        <input type="button" value="Inserisci dati" onclick="controllaDati()">
        <br><br>
        <input type="button" value="Controlla dati" onclick="apriDati()">
        <br><br>
        <input type="button" value="Cancella dati" onclick="cancellaDati()">
    </div>

    <script>
        let listaPersone;

        if (localStorage.getItem("persone") === null) {
            listaPersone = [];
        } else {
            listaPersone = JSON.parse(localStorage.getItem("persone"));
        }

        function controllaDati() {
            let erroreNome = document.getElementById("errore_nome");
            let erroreCognome = document.getElementById("errore_cognome");
            let erroreCap = document.getElementById("errore_cap");
            let erroreEmail = document.getElementById("errore_email");
            let erroreFiscale = document.getElementById("errore_fiscale");
            const regexNome = /^[a-zA-Z\s]{2,50}$/;
            const regexCap = /^\d{5}$/;
            const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const regexFiscale = /^[A-Z]{6}\d{2}[A-Z]\d{2}[A-Z]\d{3}[A-Z]$/;
            let datiCorretti = true;

            if (regexNome.test(document.getElementById("nome").value.trim())) {
                erroreNome.innerHTML = '';
            } else {
                erroreNome.innerHTML = "Nome invalido";
                datiCorretti = false;
            }

            if (regexNome.test(document.getElementById("cognome").value.trim())) {
                erroreCognome.innerHTML = '';
            } else {
                erroreCognome.innerHTML = "Cognome invalido";
                datiCorretti = false;
            }

            if (regexCap.test(document.getElementById("cap").value.trim())) {
                erroreCap.innerHTML = '';
            } else {
                erroreCap.innerHTML = "CAP invalido";
                datiCorretti = false;
            }

            if (regexEmail.test(document.getElementById("email").value.trim())) {
                erroreEmail.innerHTML = '';
            } else {
                erroreEmail.innerHTML = "Email invalido";
                datiCorretti = false;
            }

            let codiceFiscale = document.getElementById("codice_fiscale").value.trim().toUpperCase();

            if (regexFiscale.test(codiceFiscale)) {
                erroreFiscale.innerHTML = '';
            } else {
                erroreFiscale.innerHTML = "Codice fiscale invalido";
                datiCorretti = false;
            }

            if (datiCorretti) {
                salvaPersona();
            }
        }

        function salvaPersona() {
            let nuovaPersona = {
                nome: document.getElementById("nome").value.trim(),
                cognome: document.getElementById("cognome").value.trim(),
                cap: document.getElementById("cap").value.trim(),
                email: document.getElementById("email").value.trim(),
                fiscale: document.getElementById("codice_fiscale").value.trim().toUpperCase()
            };

            listaPersone.push(nuovaPersona);

            localStorage.setItem("persone", JSON.stringify(listaPersone));

            alert("Dati salvati nel local storage");

            document.getElementById("nome").value = "";
            document.getElementById("cognome").value = "";
            document.getElementById("cap").value = "";
            document.getElementById("email").value = "";
            document.getElementById("codice_fiscale").value = "";
        }

        function cancellaDati() {
            listaPersone = [];
            localStorage.setItem("persone", JSON.stringify(listaPersone));
            alert("Dati eliminati");
        }

        function apriDati() {
            if (listaPersone.length > 0) {
                window.location.href = "./anagraficaNewStampa.html";
            } else {
                alert("Nessun dato in memoria");
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagrafica 6 - No Label</title>
    <style>
        .errore-testo { color: red; margin: 0; padding-bottom: 10px; font-size: 14px; min-height: 20px; }
        input { margin-bottom: 5px; width: 250px; padding: 8px; }
        .inputs { margin: 20px; }
    </style>
</head>
<body>

    <div class="inputs">
        <input type="text" id="nome" placeholder="Inserisci Nome">
        <p id="prova_nome" class="errore-testo"></p>
        
        <input type="text" id="cognome" placeholder="Inserisci Cognome">
        <p id="prova_cognome" class="errore-testo"></p>
        
        <input type="text" id="cap" placeholder="Inserisci CAP (5 cifre)">
        <p id="prova_cap" class="errore-testo"></p>
        
        <input type="email" id="email" placeholder="Inserisci Email">
        <p id="prova_email" class="errore-testo"></p>
        
        <input type="text" id="codice_fiscale" placeholder="Codice Fiscale" style="text-transform: uppercase;">
        <p id="prova_fiscale" class="errore-testo"></p>
        
        <br>
        <input type="button" value="Inserisci dati" onclick="funzione()">
        <br><br>
        <input type="button" value="Controlla dati" onclick="controllo()">
        <br><br>
        <input type="button" value="Cancella dati" onclick="cancella()">
    </div>

    <script>
        let persone;
        if (localStorage.getItem("persone") === null) {
            persone = []; 
        } else {
            persone = JSON.parse(localStorage.getItem("persone"));
        }

        function funzione() {
            let prova_nome = document.getElementById("prova_nome");
            let prova_cognome = document.getElementById("prova_cognome");
            let prova_cap = document.getElementById("prova_cap");
            let prova_email = document.getElementById("prova_email");
            let prova_fiscale = document.getElementById("prova_fiscale");

            const nomeTest = /^[a-zA-Z\s]{2,50}$/;
            const capTest = /^\d{5}$/; 
            const emailTest = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const fiscaleTest = /^[A-Z]{6}\d{2}[A-Z]\d{2}[A-Z]\d{3}[A-Z]$/;

            let test = true;

           
            if (nomeTest.test(document.getElementById("nome").value.trim())) {
                prova_nome.innerHTML = '';
            } else {
                prova_nome.innerHTML = "Nome non valido";
                test = false;
            }

            
            if (nomeTest.test(document.getElementById("cognome").value.trim())) {
                prova_cognome.innerHTML = '';
            } else {
                prova_cognome.innerHTML = "Cognome non valido";
                test = false;
            }

            
            if (capTest.test(document.getElementById("cap").value.trim())) {
                prova_cap.innerHTML = '';
            } else {
                prova_cap.innerHTML = "CAP non valido (5 numeri)";
                test = false;
            }

            
            if (emailTest.test(document.getElementById("email").value.trim())) {
                prova_email.innerHTML = '';
            } else {
                prova_email.innerHTML = "Email non valida";
                test = false;
            }

            
            let cf_val = document.getElementById("codice_fiscale").value.trim().toUpperCase();
            if (fiscaleTest.test(cf_val)) {
                prova_fiscale.innerHTML = '';
            } else {
                prova_fiscale.innerHTML = "Codice fiscale non valido";
                test = false;
            }

            if (test) { creaPersona(); }
        } 

        function creaPersona() {
            let persona = {
                nome: document.getElementById("nome").value.trim(),
                cognome: document.getElementById("cognome").value.trim(),
                cap: document.getElementById("cap").value.trim(),
                email: document.getElementById("email").value.trim(),
                fiscale: document.getElementById("codice_fiscale").value.trim().toUpperCase()
            };

            persone.push(persona);
            localStorage.setItem("persone", JSON.stringify(persone));
            alert("Dati salvati in LocalStorage!");
            
            
            document.getElementById("nome").value = "";
            document.getElementById("cognome").value = "";
            document.getElementById("cap").value = "";
            document.getElementById("email").value = "";
            document.getElementById("codice_fiscale").value = "";
        }

        function cancella() {
            persone = [];
            localStorage.setItem("persone", JSON.stringify(persone));
            alert("Dati eliminati");
        }

        function controllo() {
            if (persone.length > 0) {
                window.location.href = "./anagrafica6Stampa.html";
            } else {
                alert("Nessun dato in memoria");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dati Registrati</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
        }

        a {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            background: #27ae60;
            color: white;
            padding: 8px 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #34495e;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>

    <a href="./anagraficaNew.html">Torna al Modulo</a>

    <h1>Elenco Utenti</h1>

    <div id="contenitore_tabella"></div>

    <script>
        let listaPersone = JSON.parse(localStorage.getItem("persone"));
        let contenitoreTabella = document.getElementById("contenitore_tabella");
        let tabella = document.createElement("table");

        
        let rigaTitoli = document.createElement("tr");

        let colonnaNome = document.createElement("th");
        colonnaNome.innerHTML = "Nome";
        rigaTitoli.appendChild(colonnaNome);

        let colonnaCognome = document.createElement("th");
        colonnaCognome.innerHTML = "Cognome";
        rigaTitoli.appendChild(colonnaCognome);

        let colonnaCap = document.createElement("th");
        colonnaCap.innerHTML = "CAP";
        rigaTitoli.appendChild(colonnaCap);

        let colonnaEmail = document.createElement("th");
        colonnaEmail.innerHTML = "Email";
        rigaTitoli.appendChild(colonnaEmail);

        let colonnaFiscale = document.createElement("th");
        colonnaFiscale.innerHTML = "Codice Fiscale";
        rigaTitoli.appendChild(colonnaFiscale);

        tabella.appendChild(rigaTitoli);

        
        for (let i = 0; i < listaPersone.length; i++) {
            let rigaPersona = document.createElement("tr");

            let datoNome = document.createElement("td");
            datoNome.innerHTML = listaPersone[i].nome;
            rigaPersona.appendChild(datoNome);

            let datoCognome = document.createElement("td");
            datoCognome.innerHTML = listaPersone[i].cognome;
            rigaPersona.appendChild(datoCognome);

            let datoCap = document.createElement("td");
            datoCap.innerHTML = listaPersone[i].cap;
            rigaPersona.appendChild(datoCap);

            let datoEmail = document.createElement("td");
            datoEmail.innerHTML = listaPersone[i].email;
            rigaPersona.appendChild(datoEmail);

            let datoFiscale = document.createElement("td");
            datoFiscale.innerHTML = listaPersone[i].fiscale;
            rigaPersona.appendChild(datoFiscale);

            tabella.appendChild(rigaPersona);
        }

        contenitoreTabella.appendChild(tabella);
    </script>

</body>
</html>

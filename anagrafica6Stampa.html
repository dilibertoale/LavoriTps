<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dati</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <table id="tabellas"> </table><br>
    <input type="button" value="Indietro" onclick="window.location.href = './index.html'">
    <script>
        let tabella = document.getElementById("tabellas")
        let persona = JSON.parse(localStorage.getItem("persone"));
        if(localStorage.length != 0){
            let t1 = document.createElement("th")
            let t2 = document.createElement("th")
            let t3 = document.createElement("th");
            let t4 = document.createElement("th");
            let t5 = document.createElement("th");
            let t6 = document.createElement("th");
            let t7 = document.createElement("th");
            let t8 = document.createElement("th");
            let t9 = document.createElement("th");
            let t10 = document.createElement("th");
            let t11 = document.createElement("th");
            let t12 = document.createElement("th");
            let t13 = document.createElement("th");
            let t14 = document.createElement("th");
            thead1.innerHTML = "Nome"
            thead2.innerHTML = "Cognome"
            thead3.innerHTML = "Email"
            thead4.innerHTML = "Codice fiscale"
            thead5.innerHTML = "Sesso"
            thead6.innerHTML = "Veicoli"
            thead7.innerHTML = "Indirizzo"
            thead8.innerHTML = "Città"
            thead9.innerHTML = "Provincia"
            thead10.innerHTML = "CAP"
            thead11.innerHTML = "Età"
            thead12.innerHTML = "Materia Preferita"
            thead13.innerHTML = "Generazione"
            thead14.innerHTML = "Cancella";
            tabella.appendChild(thead1)
            tabella.appendChild(thead2)
            tabella.appendChild(thead3)
            tabella.appendChild(thead4)
            tabella.appendChild(thead5)
            tabella.appendChild(thead6)
            tabella.appendChild(thead7)
            tabella.appendChild(thead8)
            tabella.appendChild(thead9)
            tabella.appendChild(thead10)
            tabella.appendChild(thead11)
            tabella.appendChild(thead12)
            tabella.appendChild(thead13)
            tabella.appendChild(thead14)
        } 
        
        for (let i = 0; i < persona.length; i++) {
            
            let tr = document.createElement("tr");
            let td1 = document.createElement("td");
            let td2 = document.createElement("td");
            let td3 = document.createElement("td");
            let td4 = document.createElement("td");
            let td5 = document.createElement("td");
            let td6 = document.createElement("td");
            let td7 = document.createElement("td");
            let td8 = document.createElement("td");
            let td9 = document.createElement("td");
            let td10 = document.createElement("td");
            let td11 = document.createElement("td");
            let td12 = document.createElement("td");
            let td13 = document.createElement("td");
            let td14 = document.createElement("td");
            let buttons = document.createElement("button");
            
            buttons.setAttribute('id', i);
            buttons.innerHTML =  "🚮";
            function onClick() {
                cancellas(buttons.getAttribute("id"))
            }
            buttons.addEventListener("click", onClick, false);
            td1.innerHTML = persona[i].nome;
            td2.innerHTML = persona[i].cognome;
            td3.innerHTML = persona[i].email;
            td4.innerHTML = persona[i].fiscale;
            td5.innerHTML = persona[i].sesso;
            td6.innerHTML = persona[i].veicoli;
            td7.innerHTML = persona[i].indirizzo;
            td8.innerHTML = persona[i].citta;
            td9.innerHTML = persona[i].provincia;
            td10.innerHTML = persona[i].cap;
            td11.innerHTML = persona[i].eta;
            td12.innerHTML = persona[i].materia;
            td13.innerHTML = persona[i].generazione;
            td14.appendChild(buttons);
            tr.appendChild(td1);
            tr.appendChild(td2);
            tr.appendChild(td3);
            tr.appendChild(td4);
            tr.appendChild(td5);
            tr.appendChild(td6);
            tr.appendChild(td7);
            tr.appendChild(td8);
            tr.appendChild(td9);
            tr.appendChild(td10);
            tr.appendChild(td11);
            tr.appendChild(td12);
            tr.appendChild(td13);
            tr.appendChild(td14 );
            tabella.appendChild(tr);
        }
        function cancellas(id){
            persona.splice(id,1)
            localStorage.clear()
            localStorage.setItem("persone",JSON.stringify(persona))
            window.location.href = "./anagrafica6Stampa.html"
        }
    </script>
</body>
</html>

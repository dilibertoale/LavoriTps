<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anagrafica 6</title>
</head>
<body>
    <div class="a">
        <div class="inputs">
            <label for="nome">Nome</label><br>  
            <input type="text" id="nome" name="nome"><p id="prova_nome"></p>
            
            <label for="cognome">Cognome</label><br>
            <input type="text" id="cognome" name="cognome"><p id="prova_cognome"></p>
            
            <label for="email">Email</label><br>
            <input type="email" name="email" id="email"><p id="prova_email"></p>
            
            <label for="codice_fiscale">Codice fiscale</label><br>
            <input type="text" name="codice_fiscale" id="codice_fiscale"><p id="prova_fiscale"></p>
            
            <label for="sesso">Sesso</label><br>
            <input type="radio" name="sesso" id="sesso" value="Maschio">
            <label for="sesso">M</label><br>
            <input type="radio" name="sesso" id="sesso" value="Femmina">
            <label for="sesso">F</label><br>
            <input type="radio" name="sesso" id="sesso" value="Altro">
            <label for="sesso">Altro</label><br>
            <label>Veicoli</label><br>
            <input type="checkbox" name="veicolo1" id="veicolo1" value="Auto">
            <label for="veicolo1">Auto</label><br>
            <input type="checkbox" name="veicolo2" id="veicolo2" value="Moto">
            <label for="veicolo2">Moto</label><br>
            <input type="checkbox" name="veicolo3" id="veicolo3" value="Bici">
            <label for="veicolo3">Bici</label><br>
            <input type="checkbox" name="veicolo4" id="veicolo4" value="Cavallo">
            <label for="veicolo4">Cavallo</label><br>
            <input type="checkbox" name="veicolo5" id="veicolo5" value="Deltaplano">   
            <label for="veicolo5">Deltaplano</label><br>

            <label for="indirizzo">Indirizzo</label><br>
            <input type="text" id="indirizzo" name="indirizzo"><br>
            <label for="citta">Città</label><br>
            <input type="text" name="citta" id="citta"><br>
            <label for="prov">Provincia</label><br>
            <input list="prov" name="provincia" id="provincia"><br>
            <datalist id="prov">
                <option value="MI"></option>
                <option value="VA"></option>
                <option value="NA"></option>
            </datalist>
            <label for="cap">CAP</label><br>
            <input type="text" name="cap" id="cap">
            <p id="prova_cap"></p>    
            <label for="eta">Data di nascita</label><br>
            <input type="date" name="eta" id="eta"><br> 

            <label for="materia">Materia preferita</label><br>
            <select name="materia" id="materia" multiple="multiple">
                <option value="Matematica">Matematica</option>
                <option value="Italiano">Italiano</option>
                <option value="TPS">TPS</option>
                <option value="Educazione fisica">Educazione fisica</option>
                <option value="Storia">Storia</option>
                <option value="Informatica">Informatica</option>
                <option value="Chimica">Chimica</option>
                <option value="Sistemi e reti">Sistemi e reti</option>
            </select><br>
            
            <br><input class="subm" type="button" value="Inserisci dati" onclick="funzione()">
    <br><br>
    <input type="button" value="Controlla dati" onclick="controllo()"><br><br>
    <input type="button" value="Cancella dati" onclick="cancella()"><br><br>
    <script>
      let persone;
if (localStorage.getItem("persone") === null) {
    persone = []; 
    console.log("prova");
} else {
    persone = JSON.parse(localStorage.getItem("persone"));
}
function funzione() {
    
    
    let prova_nome = document.getElementById("prova_nome");
    let prova_cognome = document.getElementById("prova_cognome");
    let prova_email = document.getElementById("prova_email");
    let prova_fiscale = document.getElementById("prova_fiscale");
    let prova_cap = document.getElementById("prova_cap");
    const nomeTest = /^[a-zA-ZàèìòùÀÈÌÒÙ\s'-]{2,50}$/u;
    const emailTest = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
    const capTest =/^[A-Za-z0-9\s-]{3,10}$/;
    const fiscaleTest = /^[A-Z]{6}[0-9]{2}[A-Z][0-9]{2}[A-Z][0-9]{3}[A-Z]$/;
    let test = true;

    if (nomeTest.test(document.getElementById("nome").value.trim())) {
        prova_nome.innerHTML = '';
    }
    else{
        prova_nome.style.color = "red";
        prova_nome.innerHTML = "Nome non valido";
        test = false;
    }

    if(nomeTest.test(document.getElementById("cognome").value.trim())){
        prova_cognome.innerHTML = '';
    }
    else{
        prova_cognome.style.color = "red";
        prova_cognome.innerHTML = "Cognome non valido";
        test = false;
    }
    if(capTest.test(document.getElementById("cap").value.trim())){
        prova_cap.innerHTML = ''
    }else{
        prova_cap.style.color = "red";
        prova_cap.innerHTML = "CAP non valido";
        test = false;
    }
    if(emailTest.test(document.getElementById("email").value.trim())){
        prova_email.innerHTML = '';
    }else{
        prova_email.style.color = "red";
        prova_email.innerHTML = "Email non valida";
        test = false;
    }
    if(fiscaleTest.test(document.getElementById("codice_fiscale").value.trim())){
        prova_fiscale.innerHTML = '';
    }else{
        prova_fiscale.style.color = "red";
        prova_fiscale.innerHTML = "Codice fiscale non valido";
        test = false;
    }



    console.log(test)
    if(test){ creaPersona() }
} 

function creaPersona(){
    let sesso = undefined;
    let veicoli = [];
    let materia = [];
    for(i=0;i<document.getElementsByName("sesso").length;i++) {
        if(document.getElementsByName("sesso")[i].checked){
            sesso = document.getElementsByName("sesso")[i].value
        }
    }

    for (let i = 1; i <= 5; i++) {
        if (document.getElementById("veicolo" + i) && document.getElementById("veicolo" + i).checked) {
            veicoli.push(document.getElementById("veicolo" + i).value);
        }
    }
    for (let i = 0; i < document.getElementById("materia").options.length; i++) {
        if (document.getElementById("materia").options[i].selected) {
            materia.push(document.getElementById("materia").options[i].value);
        }
    }
        
    
    if(sesso == undefined){
        sesso = "non impostato"
        console.log("no")
    }

    let persona = {
        nome: document.getElementById("nome").value.trim(),
        cognome: document.getElementById("cognome").value.trim(),
        email: document.getElementById("email").value.trim(),
        fiscale: document.getElementById("codice_fiscale").value.trim(),
        sesso: sesso,
        veicoli: veicoli.join(", "),
        indirizzo: document.getElementById("indirizzo").value.trim(),
        citta: document.getElementById("citta").value.trim(),
        provincia: document.getElementById("provincia").value.trim(),
        cap: document.getElementById("cap").value.trim(),
        eta: new Date().getFullYear() - document.getElementById("eta").value.substring(0,4),
        materia: materia.join(", "),
        generazione: ""
    }
    if(document.getElementById("eta").value.substring(0,4) == ''){
        persona.eta = "non impostata"
    }
    if(persona.eta != "non impostata"){
        if (document.getElementById("eta").value.substring(0,4) <= 1927) {
        persona.generazione = "Greatest Generation";
    } else if (document.getElementById("eta").value.substring(0,4) >= 1928 && document.getElementById("eta").value.substring(0,4) <= 1945) {
        persona.generazione = "Generazione Silenziosa";
    } else if (document.getElementById("eta").value.substring(0,4) >= 1946 && document.getElementById("eta").value.substring(0,4) <= 1964) {
        persona.generazione = "Baby Boomers";
    } else if (document.getElementById("eta").value.substring(0,4) >= 1965 && document.getElementById("eta").value.substring(0,4) <= 1980) {
        persona.generazione = "Generazione X";
    } else if (document.getElementById("eta").value.substring(0,4) >= 1981 && document.getElementById("eta").value.substring(0,4) <= 1996) {
        persona.generazione = "Generazione Millenials";
    } else if (document.getElementById("eta").value.substring(0,4) >= 1997 && document.getElementById("eta").value.substring(0,4) <= 2012) {
        persona.generazione = "Generazione Z";
    } else if(document.getElementById("eta").value.substring(0,4) >= 2013) {
        persona.generazione = "Generazione Alpha";
    } else {
        persona.generazione = ""
    }
    } else {
        persona.generazione = "non impostata"
    }
    
    if(persona.sesso == ""){
        persona.sesso = "non impostato"
    }
    
    if(persona.veicoli.length == 0){
        persona.veicoli= "non impostato";
    }
    if(persona.indirizzo == ""){
        persona.indirizzo = "non impostato";
    }
    if(persona.citta == ""){
        persona.citta = "non impostata"
    }
    if(persona.provincia == ""){
        persona.provincia = "non impostata"
    }
    if(persona.cap == ""){
        persona.cap = "non impostato"
    }
    persone.push(persona);
    localStorage.setItem("persone",JSON.stringify(persone))
}


function cancella(){
    if(persone.length > 0){
        alert("Dati eliminati");
    } else {
        alert("Dati non presenti");
    }
    persone = []
    localStorage.setItem("persone",JSON.stringify(persone))
    
}

function controllo(){
    if(persone.length > 0){
        window.location.href = "./anagrafica6Stampa.html";
    }
    else {
        alert("Dati inesistenti")
    }
}
    </script>
</body>

</html>
